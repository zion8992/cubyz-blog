{{ define "main" }}
  <h1>Tags</h1>
  <ul class="author-list">
    {{ range .Data.Terms.Alphabetical }}
      <li>
        <a href="{{ .Page.RelPermalink }}" class="tag">{{ .Page.Title }}</a>
        <span class="count">({{ .Count }} post{{ if ne .Count 1 }}s{{ end }})</span>
      </li>
    {{ end }}
  </ul>
{{ end }}
