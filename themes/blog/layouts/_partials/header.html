<header class="site-header">
  <div class="container header-inner">
    <a class="site-title" href="{{ "/" | relURL }}">{{ site.Title }}</a>

    <!-- hidden checkbox drives the mobile menu open/close -->
    <input type="checkbox" id="nav-toggle-cb" class="nav-toggle-cb" hidden>
    <label for="nav-toggle-cb" class="nav-toggle" aria-label="Toggle menu">☰</label>

    {{ partial "menu.html" . }}
  </div>
</header>
