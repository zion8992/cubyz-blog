{{ define "main" }}
  <h1>Posts by {{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
      <li class="post-item">
        <a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
        <div class="post-meta">{{ .Date.Format "Jan 2, 2006" }}</div>
      </li>
    {{ end }}
  </ul>
{{ end }}
