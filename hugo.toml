baseURL = 'https://zion8992.github.io/cubyz-blog/'
locale = 'en-us'
title = 'Cubyz Developer Blog'
theme = 'blog'

# --- Taxonomies ---
# key = singular, value = plural (used in URLs and front matter)
[taxonomies]
  author = 'authors'
  tag    = 'tags'

# --- Main menu ---
[menu]
[[menu.main]]
  name   = 'Home'
  pageRef = '/'
  weight = 10
[[menu.main]]
  name   = 'Blog'
  pageRef = '/blog'
  weight = 20
[[menu.main]]
  name   = 'Authors'
  pageRef = '/authors'
  weight = 30
[[menu.main]]
  name   = 'Tags'
  pageRef = '/tags'
  weight = 30

[markup.goldmark.renderer]
  unsafe = true   # allow raw HTML in markdown (optional, for demos)
