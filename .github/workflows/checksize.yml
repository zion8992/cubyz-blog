name: Check Content Size

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  check-content:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run check-content.sh
        run: |
          chmod +x ./check-content.sh
          output=$(./check-content.sh)
          if [ -n "$output" ]; then
            echo "$output"
            echo "Large files detected - failing the job."
            exit 1
          else
            echo "No oversized files found - succeeded."
          fi
